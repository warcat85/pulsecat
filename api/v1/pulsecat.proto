syntax = "proto3";

package pulsecat.v1;

option go_package = "pulsecat/api/v1";

// PulseCat service provides real-time system monitoring statistics
service PulseCat {
  // Subscribe to a metric stream
  // Client specifies start_delay, frequency, and metric_type
  // If frequency is 0, a single snapshot is returned; otherwise stream periodically
  rpc Subscribe(SubscribeRequest) returns (stream MetricPulse) {}
}

// SubscribeRequest contains subscription parameters
message SubscribeRequest {
  // Initial delay in seconds before first snapshot
  uint32 start_delay = 1;
  
  // Frequency in seconds between snapshots (0 = single snapshot)
  uint32 frequency = 2;
  
  // Requested metric type (only one metric per subscription)
  MetricType metric_type = 3;
}

// MetricPulse contains a single metric snapshot
message MetricPulse {
  // Timestamp of the snapshot (Unix epoch in seconds)
  int64 timestamp = 1;
  
  oneof metric {
    Meow meow = 2;
    LoadAverage load_average = 3;
    CPUUsage cpu_usage = 4;
    DiskUsages disk_usage = 5;
    NetworkStats network_stats = 6;
    NetworkTalkers top_talkers = 7;
    ListeningSockets listening_sockets = 8;
    TCPConnectionStates tcp_connection_states = 9;
  }
}

// Meow contains the meow message (no timestamp, as it's included in MetricPulse)
message Meow {
  string message = 1;
}

// Wrapper messages for repeated fields (required for oneof)
message DiskUsages {
  repeated DiskUsage disks = 1;
}

message NetworkTalkers {
  repeated NetworkTalker talkers = 1;
}

message ListeningSockets {
  repeated ListeningSocket sockets = 1;
}

// LoadAverage represents system load averages
message LoadAverage {
  double one_min = 1;
  double five_min = 2;
  double fifteen_min = 3;
}

// CPUUsage represents CPU usage percentages
message CPUUsage {
  double user = 1;
  double system = 2;
  double idle = 3;
  double nice = 4;
  double iowait = 5;
  double irq = 6;
  double soft_irq = 7;
  double steal = 8;
  double guest = 9;
}

// DiskUsage represents disk usage for a filesystem
message DiskUsage {
  string filesystem = 1;
  uint64 total_mb = 2;
  uint64 used_mb = 3;
  uint64 available_mb = 4;
  double used_percent = 5;
  uint64 total_inodes = 6;
  uint64 used_inodes = 7;
  double used_inodes_percent = 8;
  string mount_point = 9;
}

// NetworkStats contains overall network statistics
message NetworkStats {
  uint64 total_bytes_received = 1;
  uint64 total_bytes_sent = 2;
  uint64 packets_received = 3;
  uint64 packets_sent = 4;
  uint64 errors_received = 5;
  uint64 errors_sent = 6;
  uint64 drops_received = 7;
  uint64 drops_sent = 8;
}

// NetworkTalker represents a top network talker
message NetworkTalker {
  oneof identifier {
    ProtocolTalker protocol = 1;
    ConnectionTalker connection = 2;
  }
  uint64 bytes_per_second = 3;
  double percentage = 4;
}

// ProtocolTalker identifies traffic by protocol
message ProtocolTalker {
  string protocol = 1; // TCP, UDP, ICMP, etc.
  uint32 port = 2; // Optional port for protocol
}

// ConnectionTalker identifies traffic by connection
message ConnectionTalker {
  string source_ip = 1;
  uint32 source_port = 2;
  string destination_ip = 3;
  uint32 destination_port = 4;
  string protocol = 5;
}

// ListeningSocket represents a listening network socket
message ListeningSocket {
  string command = 1;
  uint32 pid = 2;
  string user = 3;
  string protocol = 4;
  uint32 port = 5;
  string address = 6;
}

// TCPConnectionStates contains counts of TCP connections in various states
message TCPConnectionStates {
  uint32 established = 1;
  uint32 syn_sent = 2;
  uint32 syn_recv = 3;
  uint32 fin_wait1 = 4;
  uint32 fin_wait2 = 5;
  uint32 time_wait = 6;
  uint32 close = 7;
  uint32 close_wait = 8;
  uint32 last_ack = 9;
  uint32 listen = 10;
  uint32 closing = 11;
}

// MetricType enum for requested metric type
enum MetricType {
  METRIC_TYPE_UNSPECIFIED = 0;
  METRIC_TYPE_MEOW = 1;
  METRIC_TYPE_LOAD_AVERAGE = 2;
  METRIC_TYPE_CPU_USAGE = 3;
  METRIC_TYPE_DISK_USAGE = 4;
  METRIC_TYPE_NETWORK_STATS = 5;
  METRIC_TYPE_TOP_TALKERS = 6;
  METRIC_TYPE_LISTENING_SOCKETS = 7;
  METRIC_TYPE_TCP_CONNECTION_STATES = 8;
}